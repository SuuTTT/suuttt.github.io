baseURL = 'https://suuttt.github.io/'
languageCode = 'en-us'
title = 'Dingli Su | PhD Student in AI'
theme = 'blowfish'

[params]
  name = 'Dingli Su'
  description = 'PhD Student in Reinforcement Learning at Beihang University'
  profilePicture = 'img/profile.jpg' # Placeholder
  
  [params.main]
    enableMath = true
    enableKaTeX = true
    
  [params.header]
    showLogo = false
    showTitle = true
    
  [params.footer]
    showAuthor = true
    showCopyright = true

[[menu.main]]
  name = 'Wiki'
  url = '/wiki/'
  weight = 5

[[menu.main]]
  name = 'Research'
  url = '/projects/'
  weight = 10

[[menu.main]]
  name = 'Publications'
  url = '/publications/'
  weight = 20

[[menu.main]]
  name = 'CV'
  url = '/cv/'
  weight = 30

[taxonomies]
  tag = 'tags'
  category = 'categories'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # Allows embedding PDFs/HTML
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]
  [markup.highlight]
    noClasses = false

    
